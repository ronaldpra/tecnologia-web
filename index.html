<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Portafolio - Proyecto Web</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">MiMarca</div>
            <ul>
                <li><a href="#">Inicio</a></li> <li><a href="#habilidades">Habilidades</a></li>
                <li><a href="#contacto">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="inicio">
            <h1>Bienvenido a mi sitio web</h1>
            <p>Este es un proyecto para la clase de desarrollo web.</p>
            <video width="320" height="240" controls>
                <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
                Tu navegador no soporta el video.
            </video>
        </section>

        <section id="habilidades">
            <h2>Mis Conocimientos</h2>
            <table border="1">
                <thead>
                    <tr>
                        <th>Tecnología</th>
                        <th>Nivel</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>HTML5</td>
                        <td>Avanzado</td>
                    </tr>
                    <tr>
                        <td>CSS3</td>
                        <td>Intermedio</td>
                    </tr>
                </tbody>
            </table>
        </section>

        <section>
            <h2>Ubicación</h2>
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d15863.385587784013!2d-75.56!3d6.25!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1ses!2sco!4v1700000000000" 
                width="400" height="300" style="border:0;" allowfullscreen="" loading="lazy">
            </iframe>
        </section>

        <section id="contacto">
            <h2>Contáctame</h2>
            <form id="miFormulario">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Tu nombre..." required>
                
                <label for="email">Correo:</label>
                <input type="email" id="email" name="email" required>

                <button type="submit" id="btnEnviar">Enviar Mensaje</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 - Creado con fines académicos</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
